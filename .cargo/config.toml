[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-Clink-arg=-fuse-ld=mold", "-Zshare-generics=y", "-Zthreads=0"]

[unstable]
codegen-backend = true

[profile]
incremental = true

[profile.dev]
# opt-level = 1
codegen-backend = "cranelift"
# debug = "line-tables-only"

[profile.dev.package."*"]
# opt-level = 3
codegen-backend = "llvm"
debug = true

[profile.test.package."*"]
codegen-backend = "llvm"

[profile.release]
codegen-backend = "llvm"

[profile.web]
codegen-backend = "llvm"
